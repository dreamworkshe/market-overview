name: Daily Market Data Update

on:
  schedule:
    # 7:00 AM Taiwan Time (UTC+8) is 23:00 UTC
    - cron: '0 23 * * *'
    # 12:00 PM Taiwan Time (UTC+8) is 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch: # Enable manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run Data Fetcher
        env:
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
        run: |
          echo "$GSHEET_CREDENTIALS" > credentials.json
          python scripts/fetch_data.py
          rm credentials.json

      - name: Generate HTML Dashboard
        run: python scripts/generate_html.py

      - name: Commit and Push
        run: |
          git config --global user.name "Market Bot"
          git config --global user.email "bot@marketdash.com"
          git add data/history.json public/*.html
          git commit -m "Auto Update: $(date +'%Y-%m-%d')" || exit 0
          git push origin main
