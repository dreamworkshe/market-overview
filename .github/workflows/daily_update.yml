name: Daily Market Data Update

on:
  schedule:
    # 07:00 AM Taiwan Time (Tue-Sat) is 23:00 UTC (Mon-Fri)
    - cron: '0 23 * * 1-5'
    # 11:30 AM Taiwan Time (Tue-Sat) is 03:30 UTC (Tue-Sat)
    - cron: '30 3 * * 2-6'
    # 01:00 PM Taiwan Time (Tue-Sat) is 05:00 UTC (Tue-Sat)
    - cron: '0 5 * * 2-6'
  workflow_dispatch: # Enable manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Data Fetcher
        env:
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
        run: |
          echo "$GSHEET_CREDENTIALS" > credentials.json
          python scripts/fetch_data.py
          rm credentials.json

      - name: Generate HTML Dashboard
        run: python scripts/generate_html.py

      - name: Commit and Push
        run: |
          git config --global user.name "Market Bot"
          git config --global user.email "bot@marketdash.com"
          git add data/history.json public/*.html
          git commit -m "Auto Update: $(date +'%Y-%m-%d')" || exit 0
          git push origin main
